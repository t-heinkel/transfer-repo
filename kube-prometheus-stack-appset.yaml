apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: management
            namespace: monitoring
  template:
    metadata:
      name: "kube-prometheus-stack-{{cluster}}"
    spec:
      project: default
      source:
        repoURL: https://your-nexus.example.com/repository/helm-prometheus-community/
        chart: kube-prometheus-stack
        targetRevision: "82.5.0"
        helm:
          releaseName: kube-prometheus-stack
          values: |
            # ----------------------------------------------------------------
            # Prometheus Operator
            # ----------------------------------------------------------------
            prometheusOperator:
              image:
                registry: your-nexus.example.com
                repository: prometheus-operator-iamguarded
                tag: ""
                digest: sha256:# ← hier Digest eintragen
              prometheusConfigReloader:
                image:
                  registry: your-nexus.example.com
                  repository: prometheus-config-reloader-iamguarded
                  tag: ""
                  digest: sha256:# ← hier Digest eintragen

            # ----------------------------------------------------------------
            # Prometheus
            # ----------------------------------------------------------------
            prometheus:
              prometheusSpec:
                image:
                  registry: your-nexus.example.com
                  repository: prometheus-iamguarded
                  tag: ""
                  digest: sha256:# ← hier Digest eintragen
                retention: 15d
                storageSpec:
                  volumeClaimTemplate:
                    spec:
                      accessModes: ["ReadWriteOnce"]
                      resources:
                        requests:
                          storage: 50Gi

            # ----------------------------------------------------------------
            # Alertmanager
            # ----------------------------------------------------------------
            alertmanager:
              alertmanagerSpec:
                image:
                  registry: your-nexus.example.com
                  repository: prometheus-alertmanager-iamguarded
                  tag: ""
                  digest: sha256:# ← hier Digest eintragen
              config:
                global:
                  resolve_timeout: 5m
                route:
                  group_by: ["alertname", "namespace"]
                  group_wait: 30s
                  group_interval: 5m
                  repeat_interval: 12h
                  receiver: "null"
                receivers:
                  - name: "null" # hier Slack/Mail/PagerDuty eintragen

            # ----------------------------------------------------------------
            # Node Exporter
            # ----------------------------------------------------------------
            prometheus-node-exporter:
              image:
                registry: your-nexus.example.com
                repository: prometheus-node-exporter-iamguarded
                tag: ""
                digest: sha256:# ← hier Digest eintragen

            # ----------------------------------------------------------------
            # Kube State Metrics
            # ----------------------------------------------------------------
            kube-state-metrics:
              image:
                registry: your-nexus.example.com
                repository: kube-state-metrics-iamguarded
                tag: ""
                digest: sha256:# ← hier Digest eintragen

            # ----------------------------------------------------------------
            # Grafana
            # ----------------------------------------------------------------
            grafana:
              image:
                registry: your-nexus.example.com
                repository: grafana-iamguarded
                tag: ""
                digest: sha256:# ← hier Digest eintragen

              sidecar:
                image:
                  registry: your-nexus.example.com
                  repository: k8s-sidecar
                  tag: ""
                  digest: sha256:# ← hier Digest eintragen
                dashboards:
                  enabled: true
                datasources:
                  enabled: true

              # Admin-Passwort aus existierendem Secret
              admin:
                existingSecret: grafana-admin-secret
                userKey: admin-user
                passwordKey: admin-password

              persistence:
                enabled: true
                size: 10Gi

              ingress:
                enabled: true
                ingressClassName: nginx
                hosts:
                  - grafana.your-domain.example.com

              # Dashboards als ConfigMaps (kein gnetId in air-gapped!)
              dashboardsConfigMaps:
                default: grafana-dashboards

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
